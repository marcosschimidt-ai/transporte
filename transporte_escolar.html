<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Transporte">
<title>Transporte Escolar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #F7F6F2; --surface: #FFFFFF; --surface2: #F0EEE8;
    --text: #1C1B18; --text2: #6B6860; --text3: #A8A69E;
    --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.13);
    --blue: #185FA5; --blue-l: #E6F1FB; --blue-t: #0C447C;
    --green: #3B6D11; --green-l: #EAF3DE; --green-t: #27500A;
    --amber: #BA7517; --amber-l: #FAEEDA; --amber-t: #633806;
    --red: #A32D2D; --red-l: #FCEBEB; --red-t: #791F1F;
    --r: 12px; --rs: 8px; --font: 'Nunito', system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #18181A; --surface: #232325; --surface2: #2C2C2E;
      --text: #F2F0EB; --text2: #A8A69E; --text3: #6B6860;
      --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
      --blue-l: #0C2D4D; --blue-t: #85B7EB;
      --green-l: #172B08; --green-t: #97C459;
      --amber-l: #3A2408; --amber-t: #FAC775;
      --red-l: #2D1010; --red-t: #F09595;
    }
  }
  html, body { height: 100%; background: var(--bg); font-family: var(--font); color: var(--text); overscroll-behavior: none; }
  .app { max-width: 430px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; background: var(--bg); }

  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: env(safe-area-inset-top, 12px) 16px 12px; position: sticky; top: 0; z-index: 20; }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .app-title { font-size: 19px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 7px; }
  .btn-rel { font-size: 12px; font-weight: 600; color: var(--blue-t); background: var(--blue-l); border: none; border-radius: 20px; padding: 5px 12px; cursor: pointer; font-family: var(--font); }
  .btn-rel:active { opacity: 0.7; }

  .semana-nav { display: flex; align-items: center; gap: 6px; }
  .btn-nav { width: 32px; height: 32px; border-radius: var(--rs); border: 1px solid var(--border2); background: var(--surface2); color: var(--text2); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .dias-wrap { flex: 1; display: flex; gap: 4px; }
  .dia-btn { flex: 1; padding: 6px 2px; border-radius: var(--rs); border: 1px solid var(--border); background: transparent; cursor: pointer; text-align: center; font-family: var(--font); }
  .dia-btn .dn { display: block; font-size: 10px; font-weight: 500; color: var(--text3); }
  .dia-btn .dd { display: block; font-size: 15px; font-weight: 600; color: var(--text2); margin-top: 1px; }
  .dia-btn.ativo { background: var(--blue); border-color: var(--blue); }
  .dia-btn.ativo .dn { color: rgba(255,255,255,0.7); }
  .dia-btn.ativo .dd { color: #fff; }
  .dia-btn.hoje-ref .dd { color: var(--blue); }
  .semana-info { text-align: center; font-size: 11px; color: var(--text3); margin-top: 6px; }

  .resumo { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .resumo-card { background: var(--surface2); border-radius: var(--rs); padding: 10px 8px; text-align: center; }
  .resumo-num { font-size: 24px; font-weight: 700; color: var(--text); line-height: 1; }
  .resumo-label { font-size: 10px; font-weight: 500; color: var(--text2); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }

  .lista { flex: 1; padding: 12px 16px; padding-bottom: calc(80px + env(safe-area-inset-bottom, 16px)); display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }

  .card { background: var(--surface); border-radius: var(--r); border: 1px solid var(--border); padding: 14px; }
  .card.faltou { opacity: 0.6; }
  .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
  .nome { font-size: 16px; font-weight: 600; color: var(--text); flex: 1; }
  .pill { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
  .pill-ok { background: var(--green-l); color: var(--green-t); }
  .pill-parcial { background: var(--amber-l); color: var(--amber-t); }
  .pill-falta { background: var(--red-l); color: var(--red-t); }
  .pill-nd { background: var(--surface2); color: var(--text2); }
  .acoes { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 8px; }
  .btn-acao { border-radius: var(--rs); border: 1px solid var(--border2); background: var(--surface2); padding: 10px 6px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; font-family: var(--font); }
  .btn-acao:active { transform: scale(0.94); }
  .btn-acao .ico { font-size: 20px; line-height: 1; }
  .btn-acao .rot { font-size: 10px; font-weight: 500; color: var(--text2); text-align: center; line-height: 1.2; }
  .btn-acao.on-ida { background: var(--green-l); border-color: var(--green); }
  .btn-acao.on-ida .rot { color: var(--green-t); }
  .btn-acao.on-volta { background: var(--blue-l); border-color: var(--blue); }
  .btn-acao.on-volta .rot { color: var(--blue-t); }
  .btn-acao.on-falta { background: var(--red-l); border-color: var(--red); }
  .btn-acao.on-falta .rot { color: var(--red-t); }
  .btn-obs-toggle { background: none; border: none; font-size: 12px; color: var(--text3); cursor: pointer; font-family: var(--font); padding: 2px 0; display: flex; align-items: center; gap: 4px; }
  .obs-area { display: none; margin-top: 8px; border-top: 1px solid var(--border); padding-top: 8px; }
  .obs-area.aberta { display: block; }
  .obs-input { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--rs); padding: 8px 10px; font-size: 13px; color: var(--text); font-family: var(--font); resize: none; outline: none; }

  .footer { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: var(--surface); border-top: 1px solid var(--border); padding: 10px 16px; padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px)); display: grid; grid-template-columns: 1fr 1fr; gap: 8px; z-index: 20; }
  .btn-footer { padding: 13px; border-radius: var(--rs); border: 1px solid var(--border2); background: var(--surface2); font-size: 13px; font-weight: 600; color: var(--text); cursor: pointer; font-family: var(--font); }
  .btn-footer:active { transform: scale(0.97); }
  .btn-footer.primario { background: var(--blue); border-color: var(--blue); color: #fff; }

  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--text); color: var(--bg); padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 500; opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap; z-index: 999; font-family: var(--font); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: flex-end; justify-content: center; }
  .modal-bg.aberto { display: flex; }
  .modal { background: var(--surface); border-radius: var(--r) var(--r) 0 0; padding: 20px 16px; padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px)); width: 100%; max-width: 430px; }
  .modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
  .modal-sub { font-size: 12px; color: var(--text2); margin-bottom: 16px; }
  .modal-op { display: flex; align-items: center; gap: 12px; padding: 13px; border-radius: var(--rs); border: 1px solid var(--border2); background: var(--surface2); cursor: pointer; margin-bottom: 8px; }
  .modal-op:active { opacity: 0.7; }
  .modal-op .op-ico { font-size: 22px; }
  .modal-op .op-nome { font-size: 14px; font-weight: 600; color: var(--text); }
  .modal-op .op-desc { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .btn-cancelar { width: 100%; padding: 13px; border-radius: var(--rs); border: 1px solid var(--border2); background: transparent; font-size: 14px; font-weight: 600; color: var(--text2); cursor: pointer; font-family: var(--font); margin-top: 4px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="app-title">🚐 Transporte</div>
      <button class="btn-rel" onclick="abrirModal()">📄 Relatório</button>
    </div>
    <div class="semana-nav">
      <button class="btn-nav" onclick="navSemana(-1)">‹</button>
      <div class="dias-wrap" id="dias-wrap"></div>
      <button class="btn-nav" onclick="navSemana(1)">›</button>
    </div>
    <div class="semana-info" id="semana-info"></div>
  </div>

  <div class="resumo">
    <div class="resumo-card"><div class="resumo-num" id="r-ida">0</div><div class="resumo-label">Buscaram</div></div>
    <div class="resumo-card"><div class="resumo-num" id="r-volta">0</div><div class="resumo-label">Levei</div></div>
    <div class="resumo-card"><div class="resumo-num" id="r-falta">0</div><div class="resumo-label">Faltaram</div></div>
  </div>

  <div class="lista" id="lista"></div>
</div>

<div class="footer">
  <button class="btn-footer" onclick="marcarTodos('ida')">✅ Todas buscaram</button>
  <button class="btn-footer primario" onclick="marcarTodos('volta')">🏠 Todas em casa</button>
</div>

<div class="modal-bg" id="modal-bg" onclick="fecharModal(event)">
  <div class="modal">
    <h2>Gerar Relatório</h2>
    <div class="modal-sub">Escolha o período</div>
    <div class="modal-op" onclick="gerarPDF('semana')">
      <span class="op-ico">📅</span>
      <div>
        <div class="op-nome">Semana atual</div>
        <div class="op-desc" id="desc-semana"></div>
      </div>
      <span style="margin-left:auto;color:var(--text3);font-size:18px">›</span>
    </div>
    <div class="modal-op" onclick="gerarPDF('mes')">
      <span class="op-ico">🗓️</span>
      <div>
        <div class="op-nome">Mês atual</div>
        <div class="op-desc" id="desc-mes"></div>
      </div>
      <span style="margin-left:auto;color:var(--text3);font-size:18px">›</span>
    </div>
    <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const CRIANCAS = [
  { id:'dani',   nome:'Dani',   ini:'DA', bg:'#EAF3DE', fg:'#27500A' },
  { id:'manu',   nome:'Manu',   ini:'MA', bg:'#E6F1FB', fg:'#0C447C' },
  { id:'mica',   nome:'Mica',   ini:'MI', bg:'#FAEEDA', fg:'#633806' },
  { id:'ayanny', nome:'Ayanny', ini:'AY', bg:'#FBEAF0', fg:'#72243E' },
  { id:'aninha', nome:'Aninha', ini:'AN', bg:'#E1F5EE', fg:'#085041' },
];
const DIAS_S = ['Seg','Ter','Qua','Qui','Sex'];
const MESES  = ['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

let offset=0, diaAtivo=0, dados={};
try { dados=JSON.parse(localStorage.getItem('te_dados')||'{}'); } catch(e){}
function salvar(){ try{localStorage.setItem('te_dados',JSON.stringify(dados));}catch(e){} }

function getSegunda(){
  const h=new Date(); h.setHours(0,0,0,0);
  const dow=h.getDay(), diff=dow===0?-6:1-dow;
  const s=new Date(h); s.setDate(h.getDate()+diff+offset*7); return s;
}
function getDias(){
  const s=getSegunda();
  return DIAS_S.map((n,i)=>{ const d=new Date(s); d.setDate(s.getDate()+i); return {nome:n,data:d,iso:d.toISOString().split('T')[0]}; });
}
function g(iso,id,tipo){ return dados[`${iso}_${id}_${tipo}`]||false; }
function sv(iso,id,tipo,val){ dados[`${iso}_${id}_${tipo}`]=val; salvar(); }
function gObs(iso,id){ return dados[`${iso}_${id}_obs`]||''; }
function sObs(iso,id,v){ dados[`${iso}_${id}_obs`]=v; salvar(); }

function toggle(iso,id,tipo){
  if(tipo==='falta'){ const v=!g(iso,id,'falta'); sv(iso,id,'falta',v); if(v){sv(iso,id,'ida',false);sv(iso,id,'volta',false);} }
  else { if(g(iso,id,'falta'))return; sv(iso,id,tipo,!g(iso,id,tipo)); }
  render();
}
function marcarTodos(tipo){
  const iso=getDias()[diaAtivo].iso;
  CRIANCAS.forEach(c=>{ if(!g(iso,c.id,'falta'))sv(iso,c.id,tipo,true); });
  toast(tipo==='ida'?'✅ Todas marcadas na ida!':'🏠 Todas marcadas na volta!'); render();
}
function navSemana(d){ offset+=d; render(); }
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2500); }

function pillInfo(iso,id){
  if(g(iso,id,'falta'))return['Faltou','pill-falta'];
  const i=g(iso,id,'ida'),v=g(iso,id,'volta');
  if(i&&v)return['Completo','pill-ok'];
  if(i||v)return['Parcial','pill-parcial'];
  return['Pendente','pill-nd'];
}

// MODAL
function abrirModal(){
  const seg=getSegunda(), sex=new Date(seg); sex.setDate(seg.getDate()+4);
  const fmt=d=>d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  document.getElementById('desc-semana').textContent=fmt(seg)+' a '+fmt(sex);
  const hj=new Date();
  document.getElementById('desc-mes').textContent=MESES[hj.getMonth()]+' de '+hj.getFullYear();
  document.getElementById('modal-bg').classList.add('aberto');
}
function fecharModal(e){ if(!e||e.target===document.getElementById('modal-bg')) document.getElementById('modal-bg').classList.remove('aberto'); }

// PDF
function gerarPDF(periodo){
  document.getElementById('modal-bg').classList.remove('aberto');
  toast('⏳ Gerando PDF...');
  setTimeout(()=>_pdf(periodo),400);
}

function hexRgb(h){ return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }

function _pdf(periodo){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210,ML=14,MR=14;
  let Y=14;

  const AZUL=[24,95,165], AZUL_L=[230,241,251];
  const VERDE_L=[234,243,222], AMBER_L=[250,238,218], VERM_L=[252,235,235];
  const CINZA=[240,238,232], CINZA2=[211,209,199];
  const TEXTO=[28,27,24], TEXTO2=[107,104,96], BRANCO=[255,255,255];

  const sf=(bold,size,color)=>{ doc.setFont('helvetica',bold?'bold':'normal'); doc.setFontSize(size); doc.setTextColor(...(color||TEXTO)); };
  const fr=(x,y,w,h,c,r=0)=>{ doc.setFillColor(...c); r?doc.roundedRect(x,y,w,h,r,r,'F'):doc.rect(x,y,w,h,'F'); };
  const fmt=d=>d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
  const hoje=new Date(); hoje.setHours(0,0,0,0);

  // Período
  let dias=[];
  if(periodo==='semana'){
    dias=getDias();
  } else {
    const ano=hoje.getFullYear(),mes=hoje.getMonth();
    for(let d=new Date(ano,mes,1);d<=new Date(ano,mes+1,0);d.setDate(d.getDate()+1)){
      const dow=d.getDay();
      if(dow>=1&&dow<=5){ const dt=new Date(d); dias.push({nome:DIAS_S[dow-1],data:dt,iso:dt.toISOString().split('T')[0]}); }
    }
  }

  // Cabeçalho
  fr(0,0,W,26,AZUL);
  sf(true,16,BRANCO); doc.text('Transporte Escolar',ML,11);
  const subtit=periodo==='semana'?`Semana: ${fmt(dias[0].data)} a ${fmt(dias[dias.length-1].data)}`:`Mes: ${MESES[hoje.getMonth()]} de ${hoje.getFullYear()}`;
  sf(false,9,[180,210,240]); doc.text(subtit,ML,18);
  doc.text(`Gerado em ${fmt(hoje)}`,W-MR,18,{align:'right'});
  Y=34;

  // Resumo
  let totIda=0,totVolta=0,totFalta=0,totCompleto=0;
  CRIANCAS.forEach(c=>dias.forEach(d=>{
    const falta=g(d.iso,c.id,'falta'),ida=g(d.iso,c.id,'ida'),volta=g(d.iso,c.id,'volta');
    if(falta)totFalta++; else {if(ida)totIda++;if(volta)totVolta++;if(ida&&volta)totCompleto++;}
  }));

  sf(true,10,TEXTO); doc.text('Resumo Geral',ML,Y); Y+=5;
  const cW=(W-ML-MR-9)/4;
  [{l:'Idas',v:totIda,c:VERDE_L},{l:'Voltas',v:totVolta,c:AZUL_L},{l:'Completos',v:totCompleto,c:VERDE_L},{l:'Faltas',v:totFalta,c:VERM_L}]
    .forEach((card,i)=>{
      const x=ML+i*(cW+3);
      fr(x,Y,cW,17,card.c,3);
      sf(true,14,AZUL); doc.text(String(card.v),x+cW/2,Y+8,{align:'center'});
      sf(false,7,TEXTO2); doc.text(card.l,x+cW/2,Y+14,{align:'center'});
    });
  Y+=23;

  // Tabela semana
  if(periodo==='semana'){
    sf(true,10,TEXTO); doc.text('Controle da Semana',ML,Y); Y+=5;
    const cN=36, cD=(W-ML-MR-cN)/dias.length, rH=9, hH=10;
    fr(ML,Y,W-ML-MR,hH,AZUL,2);
    sf(true,8,BRANCO); doc.text('Crianca',ML+3,Y+7);
    dias.forEach((d,i)=>doc.text(`${d.nome} ${d.data.getDate()}/${d.data.getMonth()+1}`,ML+cN+i*cD+cD/2,Y+7,{align:'center'}));
    Y+=hH;
    CRIANCAS.forEach((c,ri)=>{
      fr(ML,Y,W-ML-MR,rH,ri%2?CINZA:BRANCO);
      sf(true,9,TEXTO); doc.text(c.nome,ML+3,Y+6);
      dias.forEach((d,ci)=>{
        const falta=g(d.iso,c.id,'falta'),ida=g(d.iso,c.id,'ida'),volta=g(d.iso,c.id,'volta');
        const x=ML+cN+ci*cD;
        let cb,txt,tc;
        if(falta){cb=VERM_L;txt='Faltou';tc=[162,45,45];}
        else if(ida&&volta){cb=VERDE_L;txt='Ida+Volta';tc=[59,109,17];}
        else if(ida){cb=AMBER_L;txt='So Ida';tc=[186,117,23];}
        else{cb=ri%2?CINZA:BRANCO;txt='-';tc=TEXTO2;}
        fr(x+1,Y+1,cD-2,rH-2,cb,2);
        sf(ida&&volta||falta,7,tc); doc.text(txt,x+cD/2,Y+6,{align:'center'});
      });
      doc.setDrawColor(...CINZA2); doc.setLineWidth(0.2); doc.line(ML,Y+rH,W-MR,Y+rH);
      Y+=rH;
    });
    doc.setDrawColor(...CINZA2); doc.setLineWidth(0.3);
    doc.rect(ML,Y-rH*CRIANCAS.length-hH,W-ML-MR,rH*CRIANCAS.length+hH);
    Y+=8;
  }

  // Resumo por criança
  sf(true,10,TEXTO); doc.text('Resumo por Crianca',ML,Y); Y+=5;
  const rW=W-ML-MR, cols=[36,28,28,28,28];
  fr(ML,Y,rW,9,AZUL,2);
  sf(true,8,BRANCO);
  let rx2=ML;
  ['Crianca','Presentes','Completos','Faltas','Viagens'].forEach((h,i)=>{ doc.text(h,rx2+cols[i]/2,Y+6,{align:'center'}); rx2+=cols[i]; });
  Y+=9;
  CRIANCAS.forEach((c,ri)=>{
    let p=0,comp=0,f=0,v=0;
    dias.forEach(d=>{
      const falta=g(d.iso,c.id,'falta'),ida=g(d.iso,c.id,'ida'),volta=g(d.iso,c.id,'volta');
      if(falta)f++; else{if(ida||volta)p++;if(ida&&volta){comp++;v+=2;}else if(ida||volta)v++;}
    });
    fr(ML,Y,rW,9,ri%2?CINZA:BRANCO);
    doc.setFillColor(...hexRgb(c.bg)); doc.circle(ML+5.5,Y+4.5,3,'F');
    sf(true,6,hexRgb(c.fg)); doc.text(c.ini,ML+5.5,Y+5.5,{align:'center'});
    sf(true,9,TEXTO); doc.text(c.nome,ML+11,Y+6);
    [p,comp,f,v].forEach((val,i)=>{
      const tc=i===0?[59,109,17]:i===1?[24,95,165]:i===2&&f>0?[162,45,45]:TEXTO;
      sf(true,10,tc); doc.text(String(val),ML+cols[0]+cols.slice(1,i+2).reduce((a,b)=>a+b,0)-cols[i+1]/2,Y+6.5,{align:'center'});
    });
    doc.setDrawColor(...CINZA2); doc.setLineWidth(0.2); doc.line(ML,Y+9,W-MR,Y+9);
    Y+=9;
  });
  doc.setDrawColor(...CINZA2); doc.setLineWidth(0.3);
  doc.rect(ML,Y-9*CRIANCAS.length-9,rW,9*CRIANCAS.length+9);
  Y+=8;

  doc.setDrawColor(...CINZA2); doc.setLineWidth(0.3); doc.line(ML,Y,W-MR,Y); Y+=5;
  sf(false,7,TEXTO2); doc.text('Ida+Volta = completo   |   So Ida = apenas busca   |   Faltou = ausente',W/2,Y,{align:'center'});
  sf(false,8,TEXTO2); doc.text('Transporte Escolar',W/2,290,{align:'center'});

  const nome=periodo==='semana'?`transporte_semana_${dias[0].iso}.pdf`:`transporte_${MESES[hoje.getMonth()]}_${hoje.getFullYear()}.pdf`;
  doc.save(nome);
  toast('✅ PDF salvo!');
}

// RENDER
function renderTabs(){
  const dias=getDias(),hoje=new Date();hoje.setHours(0,0,0,0);
  const wrap=document.getElementById('dias-wrap');wrap.innerHTML='';
  dias.forEach((d,i)=>{
    const eH=d.data.getTime()===hoje.getTime();
    const b=document.createElement('button');
    b.className='dia-btn'+(i===diaAtivo?' ativo':'')+(eH&&offset===0?' hoje-ref':'');
    b.innerHTML=`<span class="dn">${d.nome}</span><span class="dd">${d.data.getDate()}</span>`;
    b.onclick=()=>{diaAtivo=i;render();};
    wrap.appendChild(b);
  });
  const seg=getSegunda(),sex=new Date(seg);sex.setDate(seg.getDate()+4);
  const fmt=d=>d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  document.getElementById('semana-info').textContent=fmt(seg)+' – '+fmt(sex);
}

function renderResumo(iso){
  let ida=0,volta=0,falta=0;
  CRIANCAS.forEach(c=>{if(g(iso,c.id,'falta')){falta++;return;}if(g(iso,c.id,'ida'))ida++;if(g(iso,c.id,'volta'))volta++;});
  document.getElementById('r-ida').textContent=ida;
  document.getElementById('r-volta').textContent=volta;
  document.getElementById('r-falta').textContent=falta;
}

function renderLista(iso){
  const lista=document.getElementById('lista');lista.innerHTML='';
  CRIANCAS.forEach(c=>{
    const falta=g(iso,c.id,'falta'),ida=g(iso,c.id,'ida'),volta=g(iso,c.id,'volta'),obs=gObs(iso,c.id);
    const [pt,pc]=pillInfo(iso,c.id);
    const aId='oa_'+c.id;
    const card=document.createElement('div');
    card.className='card'+(falta?' faltou':'');
    card.innerHTML=`
      <div class="card-header">
        <div class="avatar" style="background:${c.bg};color:${c.fg}">${c.ini}</div>
        <div class="nome">${c.nome}</div>
        <span class="pill ${pc}">${pt}</span>
      </div>
      <div class="acoes">
        <button class="btn-acao${ida&&!falta?' on-ida':''}" onclick="toggle('${iso}','${c.id}','ida')">
          <span class="ico">${ida&&!falta?'✅':'🏫'}</span><span class="rot">Buscou</span>
        </button>
        <button class="btn-acao${volta&&!falta?' on-volta':''}" onclick="toggle('${iso}','${c.id}','volta')">
          <span class="ico">${volta&&!falta?'🏠':'🚐'}</span><span class="rot">Levei</span>
        </button>
        <button class="btn-acao${falta?' on-falta':''}" onclick="toggle('${iso}','${c.id}','falta')">
          <span class="ico">${falta?'❌':'📵'}</span><span class="rot">Faltou</span>
        </button>
      </div>
      <button class="btn-obs-toggle" onclick="document.getElementById('${aId}').classList.toggle('aberta')">
        📝 ${obs?'Ver observação':'Adicionar observação'}
      </button>
      <div class="obs-area ${obs?'aberta':''}" id="${aId}">
        <textarea class="obs-input" rows="2" placeholder="Ex: avo busca hoje, saiu mais cedo..." oninput="sObs('${iso}','${c.id}',this.value)">${obs}</textarea>
      </div>`;
    lista.appendChild(card);
  });
}

function render(){
  const dias=getDias(),iso=dias[diaAtivo].iso;
  renderTabs();renderResumo(iso);renderLista(iso);
}

function init(){
  const dow=new Date().getDay();
  diaAtivo=(dow>=1&&dow<=5)?dow-1:0;
  render();
}
init();
</script>
</body>
</html>
